body:
  text: 天官冢宰第一大宰以擾萬民擾尋倫反陸德明釋文引徐李遂人以下劑致氓注氓猶懵懵武冰反釋文以興鋤利氓鋤音鉏遂師及蜃車之役注蜃禮記或作摶徒官反遂大夫趨其稼事趨倉苟反草人掌土化之法注若汜勝之術也汜音凡赤緹用羊緹宅奚反鹹潟用貆一音許元反埴壚用豖壚一音閭輕爂用犬爂音婦堯反稻人以溝蕩水蕩吐黨反並同上土訓以詔地事注幽并地宜麻仁皮反釋文麻如字一本作糜引李及聶氏廩人大祭祀則共其接盛注接讀為一扱再祭之扱創陟反釋文引李聶舍人共簠簋簠方于反釋文春官宗伯第三乃立春官宗伯注帝曰俞音由釋文鬯人注釀秬為酒秬其虛反同上𩎟師𩎟音妹釋文引劉李注杜子春讀𩎟為菋荎著之菋荎音姪著張慮反釋文鞮鞻氏注今時倡踏鼓沓行者踏吐獵反胝祲且衽反大宗伯以禋祀祀昊天上帝注禋之言煙音煙並同上小宗伯以秬鬯渳注杜子春讀渳為泯亡辨反釋文渳彌兗切集韻上聲二十八獮渳字注雨竁昌鋭反釋文肄儀為位肄似二反鬱人和鬱鬯注以煮之鐎即修反司尊彝盎齊涗酌涗音雪大司樂大傀異災傀音杜回反小師簫管注如今賣飴餳所吹者餳音唐其同下聲肆注鍾聲下當蹕字葵反徹聲韽烏南反華氏掌共燋契燋祖堯反一音哉益反釋文慈焦切灼龜木集韻下平聲四宵燋字注遂吹其焌契焌祖館反釋文大祝四曰振動音董同上巾車重翟錫面朱總注故書朱總為䌆兵廢反釋文立廢切集韻去聲二十廢䌆字注藻車藻蔽注故書藻為𨎮音倉會反釋文凡以神仕者以猶鬼神示之居注在男曰覡音胡隔反同上夏官司馬第四奇爟注故書爟為燋音灼釋文大司馬摝鐸摝扶表反同上鼓皆駴音亥釋文倚亥切疾擊鼓也集韻上聲十五海駴字注則厭而奉主車厭音於入反注同釋文司弓矢以授射甲革椹質者注故書椹為鞎音艮一音居言反又音狠茀矢茀一音孚忽反一音勃或音弗弩矢恆矢痺矢用諸散射注前後訂其行平也訂音亭挍人執駒注三歲曰駣湯堯反並同上職方氏七閩注閩芉蠻矣芉今周禮無此字國語則有釋文其澤藪曰雲瞢音亡雄反釋文謨蓬切集韻上平聲一東瞢字注其浸潁湛唐感反釋文徒感切水名集韻上聲四十八感湛字注其澤藪曰圃田注在中牟中音仲牟無不反釋文其浸波溠莊加反其浸泝沭音餘戍反其澤藪曰弦蒲注在汧空定反其川涇汭而類反其川呼池呼胡哥反池如字並同上秋官司寇第五硩蔟氏硩思亦反釋文朝士禁慢朝錯立族談者注僔語也僔音纂同上司刑劓罪五百劓魚介反又疑既反釋文牛戒切截鼻也集韻去聲十六怪劓字注刖罪五百刖音五骨反釋文司剌三赦曰蠢愚注生而癡騃五亥反又吐在反蠟氏掌除胔注故書胔作脊慈亦反司烜氏共墳燭庭燎注故書墳為蕡一音婦輩反硩蔟氏十有二月之號注月謂從娵至荼音舒大行人廟中無相息丈反掌客車三秅注則三十稯也稯音總並同上冬官考工記秦無廬注竹攢柲攢音纂釋文夫人而能為鎛也夫方無反夫人而能為廬也注善作矜祕矜其京反妢胡之笴注及箘簬楛箘其轉反有時以澤音釋刮摩之工五注刮作捖侯管反搏埴之工二摶音團欲其朴屬而微至屬音促注同輪己庳音他輈人同輪人牙也者注謂輪輮也輮而又反欲其揱爾而纖也揱所咸反欲其眼也注眼讀如限切之限限如字下同切倉愛反欲其幬之廉也幬一音持株反或一音蹈視其綆方善反又姑杏反注謂輪箄也箄方匹反一音薄計反下皆同並同上則轂雖敝不藃好角反釋文引李戚捎其藪一音倉豆反釋文藪干侯切車轂空衆輻之所輳集韻去聲五十候藪字注去一以為賢胡反注同釋文引劉李施筋必數色住反釋文去一以為骹圍骹苦教反揉輻必齊揉奴丑反一音而又反牙得則無槷而固槷一音素結反則是搏以行石也搏丈轉反不甐於鑿甐一音鱗而內不挫祖加反萭之以視其匡也萭音俱注同輿人去一以為轛一音都回反輈人而無弧深注弧讀為淨而不汙之汙音烏一音紆良輈環灂在學反築氏執下齊注大刃削音笑下同桃氏臘廣二寸有半寸臘魯頰反鳧氏鍾縣謂之旋信犬反㡆氏以涗水漚其絲漚烏侯反涑帛以欄為灰欄來踐反或音蘭並同上玉人牙璋中璋七寸注皆有鉏牙之飾鉏側魚反釋文引劉李矢人茀矢參分茀音拂釋文殺矢七分殺音拂亦弗之能憚矣憚直旦反注同又直丹反並同上梓人紆行紆香于反釋文紆曲也句曲切集韻上平聲十虞紆字注大胸耀後耀羊肖反注耀讀為哨頎小也哨音與耀同釋文引劉李頎音懇釋文數目顅脰數粗角反釋文仕角切促也集韻入聲四覺數字注顅脰古慳反又戶弔反釋文凡攫閷援簭之類攫九夫反釋文作其鱗之而注頰𩑔其懇反一音苦紇反又音混同上則必穨爾如委矣頽湯過反釋文吐臥切委廢貌集韻去聲三十九過𩑔字注梓人為侯上兩個大鄭依字釋文廬人剌兵欲無蜎烏犬烏玄二反或巨兗反細則校侯巧反置而搖之置直吏反車人為耒庛長尺有一寸庛似斯反直庛則利推湯雷反渠三柯者三注所謂牙五家反下同牝服二柯牝扶細反弓人災栗不迆災栗如字老牛之角紾而昔注昔讀為交錫之錫鄭且苦反並同上蹙於腦而休於氣腦乃老反釋文制李作腦
